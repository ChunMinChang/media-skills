<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Interop 2026 WebRTC — Bug Dependency Tree</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #0d1117;
    color: #e6edf3;
    height: 100vh;
    overflow: hidden;
  }
  #header {
    padding: 12px 20px;
    background: #161b22;
    border-bottom: 1px solid #30363d;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  #header h1 {
    font-size: 15px;
    font-weight: 600;
    color: #e6edf3;
  }
  #header a {
    font-size: 12px;
    color: #58a6ff;
    text-decoration: none;
  }
  #header a:hover { text-decoration: underline; }
  #legend {
    display: flex;
    gap: 16px;
    margin-left: auto;
    font-size: 12px;
    color: #8b949e;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
    border: 2px solid;
  }
  #canvas { width: 100%; height: calc(100vh - 49px); }
  .node circle {
    stroke-width: 2px;
    cursor: pointer;
    transition: r 0.15s;
  }
  .node circle:hover { filter: brightness(1.3); }
  .node text {
    font-size: 11px;
    fill: #e6edf3;
    pointer-events: none;
    dominant-baseline: middle;
  }
  .link {
    fill: none;
    stroke: #30363d;
    stroke-width: 1.5px;
  }
  .tooltip {
    position: fixed;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    padding: 10px 14px;
    font-size: 12px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    max-width: 300px;
    z-index: 100;
  }
  .tooltip .tt-title { font-weight: 600; color: #e6edf3; margin-bottom: 4px; }
  .tooltip .tt-id { color: #58a6ff; font-size: 11px; }
  .tooltip .tt-group { color: #8b949e; font-size: 11px; margin-top: 4px; }
  #instructions {
    position: fixed;
    bottom: 16px;
    left: 20px;
    font-size: 11px;
    color: #484f58;
  }
</style>
</head>
<body>
<div id="header">
  <h1>Interop 2026 WebRTC — Bug Dependency Tree</h1>
  <a href="https://bugzilla.mozilla.org/show_bug.cgi?id=2017363" target="_blank">Bug 2017363 ↗</a>
  <div id="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:#1f6feb;border-color:#388bfd"></div> Meta / Group
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#1a4a1a;border-color:#3fb950"></div> Stats
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#4a2a1a;border-color:#d29922"></div> Protocol
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#2a1a4a;border-color:#bc8cff"></div> Parameters
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#1a3a4a;border-color:#39c5cf"></div> Transport
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#3a1a2a;border-color:#f78166"></div> Data Channel
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:#3a3a1a;border-color:#e3b341"></div> SDP
    </div>
  </div>
</div>
<svg id="canvas"></svg>
<div class="tooltip" id="tooltip"></div>
<div id="instructions">Scroll to zoom · Drag to pan · Click node to open bug</div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
const BUGZILLA = "https://bugzilla.mozilla.org/show_bug.cgi?id=";

const COLORS = {
  meta:      { fill: "#1f6feb", stroke: "#388bfd" },
  stats:     { fill: "#1a4a1a", stroke: "#3fb950" },
  protocol:  { fill: "#4a2a1a", stroke: "#d29922" },
  params:    { fill: "#2a1a4a", stroke: "#bc8cff" },
  transport: { fill: "#1a3a4a", stroke: "#39c5cf" },
  datachan:  { fill: "#3a1a2a", stroke: "#f78166" },
  sdp:       { fill: "#3a3a1a", stroke: "#e3b341" },
};

const data = {
  id: "2017363",
  label: "[meta] Interop 2026 WebRTC",
  type: "meta",
  url: BUGZILLA + "2017363",
  children: [
    {
      id: "group-stats",
      label: "Stats & Metrics",
      type: "meta",
      group: true,
      children: [
        { id: "1225724", label: "RTCCertificateStats implementation", type: "stats", url: BUGZILLA+"1225724" },
        { id: "1728364", label: "RTCAudioSourceStats implementation", type: "stats", url: BUGZILLA+"1728364" },
        { id: "1813824", label: "RTCRtpStreamStats.transportId", type: "stats", url: BUGZILLA+"1813824" },
        { id: "2000975", label: "getStats RTP stats timing", type: "stats", url: BUGZILLA+"2000975" },
        { id: "2019331", label: "RTCTransportStats.selectedCandidatePairId", type: "stats", url: BUGZILLA+"2019331" },
        { id: "2019333", label: "RTCTransportStats certificate ID fields", type: "stats", url: BUGZILLA+"2019333" },
        { id: "2019349", label: "RTCTransportStats byte counters", type: "stats", url: BUGZILLA+"2019349" },
        { id: "2019355", label: "RTCTransportStats.iceRole", type: "stats", url: BUGZILLA+"2019355" },
        { id: "2019356", label: "RTCTransportStats DTLS state/role", type: "stats", url: BUGZILLA+"2019356" },
        { id: "2019389", label: "RTCTransportStats encryption details", type: "stats", url: BUGZILLA+"2019389" },
      ]
    },
    {
      id: "group-protocol",
      label: "Protocol & Config",
      type: "meta",
      group: true,
      children: [
        { id: "1004510", label: "PRANSWER support in JSEP", type: "protocol", url: BUGZILLA+"1004510" },
        { id: "1339203", label: "rtcpMuxPolicy parameter support", type: "protocol", url: BUGZILLA+"1339203" },
        { id: "1340372", label: "3gpp video-orientation support", type: "protocol", url: BUGZILLA+"1340372" },
        { id: "1529398", label: "iceCandidatePoolSize implementation", type: "protocol", url: BUGZILLA+"1529398" },
        { id: "1529588", label: "ICE server validation improvements", type: "protocol", url: BUGZILLA+"1529588" },
        { id: "1617686", label: "ice-ufrag/ice-pwd char validation", type: "protocol", url: BUGZILLA+"1617686" },
        { id: "2014357", label: "Two-byte RTP header extension IDs", type: "protocol", url: BUGZILLA+"2014357" },
      ]
    },
    {
      id: "group-params",
      label: "Parameters & Features",
      type: "meta",
      group: true,
      children: [
        { id: "1584318", label: "Per-track CNAME in RTCRtcpParameters", type: "params", url: BUGZILLA+"1584318" },
        { id: "1765851", label: "RTCRtpParameters.headerExtensions", type: "params", url: BUGZILLA+"1765851" },
        { id: "2016190", label: "setCodecPreferences codec disabling", type: "params", url: BUGZILLA+"2016190" },
        { id: "2019359", label: "RTCRtcpParameters.reducedSize", type: "params", url: BUGZILLA+"2019359" },
      ]
    },
    {
      id: "group-transport",
      label: "Transport & Connection",
      type: "meta",
      group: true,
      children: [
        { id: "1307994", label: "RTCIceTransport interface", type: "transport", url: BUGZILLA+"1307994" },
        { id: "1805446", label: "RTCDtlsTransport.getRemoteCertificates()", type: "transport", url: BUGZILLA+"1805446" },
        { id: "1805480", label: "RTCDtlsTransport state closure handling", type: "transport", url: BUGZILLA+"1805480" },
        { id: "1814460", label: "RTCError for DataChannel/SCTP failures", type: "transport", url: BUGZILLA+"1814460" },
        { id: "1814461", label: "RTCError for DTLS failures", type: "transport", url: BUGZILLA+"1814461" },
        { id: "2019346", label: "iceConnectionState test fixes", type: "transport", url: BUGZILLA+"2019346" },
      ]
    },
    {
      id: "group-datachan",
      label: "Data Channel",
      type: "meta",
      group: true,
      children: [
        { id: "2019361", label: "RTCSctpTransport-events correctness", type: "datachan", url: BUGZILLA+"2019361" },
        { id: "2019365", label: "RTCDataChannel garbage collection test", type: "datachan", url: BUGZILLA+"2019365" },
        { id: "2019378", label: "RTCSctpTransport-maxChannels verification", type: "datachan", url: BUGZILLA+"2019378" },
        { id: "2019461", label: "Handover datachannel tests", type: "datachan", url: BUGZILLA+"2019461" },
      ]
    },
    {
      id: "group-sdp",
      label: "SDP & Signaling",
      type: "meta",
      group: true,
      children: [
        { id: "1806181", label: "Invalid SDP error handling", type: "sdp", url: BUGZILLA+"1806181" },
        { id: "1806185", label: "Unusual m-section type handling", type: "sdp", url: BUGZILLA+"1806185" },
        { id: "2019353", label: "setLocalDescription test fixes", type: "sdp", url: BUGZILLA+"2019353" },
        { id: "2019370", label: "setParameters compatibility mode", type: "sdp", url: BUGZILLA+"2019370" },
        { id: "2019375", label: "H.264 plugin integration", type: "sdp", url: BUGZILLA+"2019375" },
        { id: "2019381", label: "Early media handling", type: "sdp", url: BUGZILLA+"2019381" },
        { id: "2019387", label: "setCodecPreferences call fix", type: "sdp", url: BUGZILLA+"2019387" },
        { id: "2019469", label: "RTP header extensions recvonly issue", type: "sdp", url: BUGZILLA+"2019469" },
      ]
    },
  ]
};

const svg = d3.select("#canvas");
const width = window.innerWidth;
const height = window.innerHeight - 49;
svg.attr("viewBox", [0, 0, width, height]);

const g = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.2, 4]).on("zoom", e => g.attr("transform", e.transform)));

const root = d3.hierarchy(data);
const treeLayout = d3.tree().size([height - 80, width - 280]).separation((a, b) => {
  return (a.parent === b.parent ? 1 : 1.4) / a.depth;
});
treeLayout(root);

// Draw links
g.selectAll(".link")
  .data(root.links())
  .join("path")
  .attr("class", "link")
  .attr("d", d3.linkHorizontal().x(d => d.y).y(d => d.x));

// Draw nodes
const node = g.selectAll(".node")
  .data(root.descendants())
  .join("g")
  .attr("class", "node")
  .attr("transform", d => `translate(${d.y},${d.x})`);

node.append("circle")
  .attr("r", d => d.depth === 0 ? 14 : d.data.group ? 10 : 7)
  .attr("fill", d => (COLORS[d.data.type] || COLORS.meta).fill)
  .attr("stroke", d => (COLORS[d.data.type] || COLORS.meta).stroke)
  .on("click", (event, d) => {
    if (d.data.url) window.open(d.data.url, "_blank");
  })
  .on("mouseover", (event, d) => {
    const tt = document.getElementById("tooltip");
    tt.innerHTML = `
      <div class="tt-title">${d.data.label}</div>
      ${d.data.id && !d.data.group ? `<div class="tt-id">Bug ${d.data.id}</div>` : ""}
      ${d.data.type ? `<div class="tt-group">${d.data.type}</div>` : ""}
    `;
    tt.style.opacity = "1";
    tt.style.left = (event.clientX + 14) + "px";
    tt.style.top = (event.clientY - 10) + "px";
  })
  .on("mousemove", (event) => {
    const tt = document.getElementById("tooltip");
    tt.style.left = (event.clientX + 14) + "px";
    tt.style.top = (event.clientY - 10) + "px";
  })
  .on("mouseout", () => {
    document.getElementById("tooltip").style.opacity = "0";
  });

node.append("text")
  .attr("x", d => d.depth === 0 ? 18 : d.data.group ? 14 : 11)
  .attr("text-anchor", "start")
  .attr("font-size", d => d.depth === 0 ? 13 : d.data.group ? 12 : 10.5)
  .attr("font-weight", d => d.depth <= 1 ? "600" : "400")
  .attr("fill", d => d.depth === 0 ? "#e6edf3" : d.data.group ? "#c9d1d9" : "#8b949e")
  .text(d => {
    const label = d.data.label;
    // Truncate long labels
    if (!d.data.group && d.depth > 0 && label.length > 38) return label.slice(0, 37) + "…";
    return label;
  });

// Pan to center root vertically
const rootX = root.x;
g.attr("transform", `translate(30, ${height/2 - rootX})`);
svg.call(d3.zoom().transform, d3.zoomIdentity.translate(30, height/2 - rootX));
</script>
</body>
</html>
